services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: directory-saas-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      APP_PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@directory-saas-postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_HOST: directory-saas-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}
      CORS_ORIGINS: ${CORS_ORIGINS}
      S3_ENDPOINT: http://directory-saas-minio:9000
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-https://s3.${DOMAIN}}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET:-directory-saas}
      S3_REGION: ${S3_REGION:-us-east-1}
      MEILISEARCH_URL: http://directory-saas-meilisearch:7700
      MEILISEARCH_API_KEY: ${MEILI_MASTER_KEY}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      LOG_LEVEL: ${LOG_LEVEL:-log}
      THROTTLE_TTL: ${THROTTLE_TTL:-60}
      THROTTLE_LIMIT: ${THROTTLE_LIMIT:-100}
      DOMAIN: ${DOMAIN}
    networks:
      - internal
      - coolify
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    labels:
      - "traefik.enable=true"
      # Route on both HTTP and HTTPS (Cloudflare terminates SSL, sends HTTP to origin)
      - "traefik.http.routers.api.rule=Host(`api.${DOMAIN}`)"
      - "traefik.http.routers.api.entrypoints=http,https"
      - "traefik.http.routers.api.tls=true"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=3000"
      - "traefik.http.routers.api.middlewares=api-cors@docker"
      # CORS middleware
      - "traefik.http.middlewares.api-cors.headers.accesscontrolallowmethods=GET,POST,PUT,PATCH,DELETE,OPTIONS"
      - "traefik.http.middlewares.api-cors.headers.accesscontrolallowheaders=Content-Type,Authorization,X-Tenant-ID,X-Tenant-Slug"
      - "traefik.http.middlewares.api-cors.headers.accesscontrolalloworiginlist=https://app.${DOMAIN},https://admin.${DOMAIN},https://*.${DOMAIN}"
      - "traefik.http.middlewares.api-cors.headers.accesscontrolmaxage=86400"

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
      args:
        VITE_API_URL: https://api.${DOMAIN}
        VITE_BRAND_NAME: ${BRAND_NAME:-Habesha Hub}
        VITE_BRAND_HUE: ${BRAND_HUE:-145}
    container_name: directory-saas-web
    restart: unless-stopped
    networks:
      - internal
      - coolify
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`app.${DOMAIN}`)"
      - "traefik.http.routers.web.entrypoints=http,https"
      - "traefik.http.routers.web.tls=true"
      - "traefik.http.routers.web.tls.certresolver=letsencrypt"
      - "traefik.http.services.web.loadbalancer.server.port=80"

  admin:
    build:
      context: ..
      dockerfile: docker/Dockerfile.admin
      args:
        VITE_API_URL: https://api.${DOMAIN}
        VITE_BRAND_NAME: ${BRAND_NAME:-Habesha Hub}
        VITE_BRAND_HUE: ${BRAND_HUE:-145}
    container_name: directory-saas-admin
    restart: unless-stopped
    networks:
      - internal
      - coolify
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.admin.rule=Host(`admin.${DOMAIN}`)"
      - "traefik.http.routers.admin.entrypoints=http,https"
      - "traefik.http.routers.admin.tls=true"
      - "traefik.http.routers.admin.tls.certresolver=letsencrypt"
      - "traefik.http.services.admin.loadbalancer.server.port=80"

  provider-portal:
    build:
      context: ..
      dockerfile: docker/Dockerfile.provider
      args:
        VITE_API_URL: https://api.${DOMAIN}
        VITE_BRAND_NAME: ${BRAND_NAME:-Habesha Hub}
        VITE_BRAND_HUE: ${BRAND_HUE:-145}
    container_name: directory-saas-provider
    restart: unless-stopped
    networks:
      - internal
      - coolify
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.provider.rule=HostRegexp(`^[a-z0-9-]+\\.${DOMAIN}$$`) && !Host(`api.${DOMAIN}`) && !Host(`app.${DOMAIN}`) && !Host(`admin.${DOMAIN}`) && !Host(`s3.${DOMAIN}`)"
      - "traefik.http.routers.provider.entrypoints=http,https"
      - "traefik.http.routers.provider.tls=true"
      - "traefik.http.routers.provider.tls.certresolver=letsencrypt"
      - "traefik.http.routers.provider.priority=1"
      - "traefik.http.services.provider.loadbalancer.server.port=80"

  postgres:
    image: pgvector/pgvector:pg17
    container_name: directory-saas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-directory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-directory_saas}
    volumes:
      - directory_pg_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-directory}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: directory-saas-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - directory_redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: directory-saas-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - directory_minio_data:/data
    networks:
      - internal
      - coolify
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.minio.rule=Host(`s3.${DOMAIN}`)"
      - "traefik.http.routers.minio.entrypoints=http,https"
      - "traefik.http.routers.minio.tls=true"
      - "traefik.http.routers.minio.tls.certresolver=letsencrypt"
      - "traefik.http.services.minio.loadbalancer.server.port=9000"

  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: directory-saas-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: production
      MEILI_MAX_INDEXING_MEMORY: 512MiB
    volumes:
      - directory_meili_data:/meili_data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://127.0.0.1:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  directory_pg_data:
  directory_redis_data:
  directory_minio_data:
  directory_meili_data:

networks:
  internal:
    driver: bridge
  coolify:
    external: true
